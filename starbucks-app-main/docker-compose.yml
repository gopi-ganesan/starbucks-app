version: '3.8'

services:
  frontend:
    container_name: starbucks-frontend
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - starbucks-net
    restart: unless-stopped

  backend:
    container_name: starbucks-backend
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-password123}@mongo-db:27017/${MONGO_DB:-starbucks}?authSource=admin
    depends_on:
      - mongo-db
    networks:
      - starbucks-net
    restart: unless-stopped

  mongo-db:
    image: mongo:4.4-focal
    container_name: starbucks-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-password123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-starbucks}
    volumes:
      - mongo-data:/data/db
    networks:
      - starbucks-net

  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: starbucks-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASS:-password123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-password123}@mongo-db:27017/${MONGO_DB:-starbucks}?authSource=admin
    depends_on:
      - mongo-db
    networks:
      - starbucks-net
volumes:
  mongo-data:

networks:
  starbucks-net:
    driver: bridge
