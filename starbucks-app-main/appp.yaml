apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: starbucks-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR-USERNAME/starbucks-kubernetes.git
    targetRevision: HEAD
    path: helm/my-chart

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
