apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.backend.namespace }}
  labels:
    app: {{ .Values.backend.app }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.backend.app }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.app }}
    spec:
      containers:
        - name: {{ .Values.backend.name }}
          image: {{ .Values.backend.image }}
          imagePullPolicy: {{ .Values.backend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: PORT
              value: {{ .Values.backend.port | quote }}
            - name: MONGO_URI
              value: {{ printf "mongodb://%s.%s.svc.cluster.local:%v/%s" .Values.mongodb.serviceName .Values.mongodb.namespace .Values.mongodb.port .Values.mongodb.database | quote }}
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: mongo-root-username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: mongo-root-password
          startupProbe:
            httpGet:
              path: {{ .Values.backend.path }}
              port: {{ .Values.backend.port }}
            failureThreshold: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.path }}
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.path }}
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: {{ .Values.backend.namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.backend.app }}
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.targetPort }}
